name: uni_payments_example
description: Demonstrates how to use the uni_payments plugin.
publish_to: "none"

environment:
  sdk: ">=3.8.1 <4.0.0"
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter

  uni_payments:
    path: ../

  google_fonts: ^6.2.1
  simple_icons: ^14.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

dependency_overrides:
  # win32 5.5.0 references the removed `UnmodifiableUint8ListView` type and
  # fails to compile on Dart 3.10+. Force a newer 5.x that drops it.
  win32: ^5.5.5
  # path_provider_android 2.2.4 still ships a static `registerWith(Registrar)`
  # method for v1 embedding; the `Registrar` class was removed in Flutter 3.29+
  # so the plugin no longer compiles. 2.3.0+ dropped the legacy method.
  path_provider_android: ^2.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/json/
