name: uni_payments
description: >-
  Unified Flutter API over Razorpay, Stripe, PayPal, Paystack, Flutterwave,
  Paytm, Cashfree, PhonePe, Google Pay and Apple Pay.
version: 0.0.6
homepage: https://github.com/NehilKoshiya/uni_payments
repository: https://github.com/NehilKoshiya/uni_payments
issue_tracker: https://github.com/NehilKoshiya/uni_payments/issues
documentation: https://github.com/NehilKoshiya/uni_payments#readme

topics:
  - payments
  - stripe
  - razorpay
  - paypal
  - flutter

environment:
  sdk: ">=3.8.1 <4.0.0"
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter

  razorpay_flutter: ^1.4.5
  flutter_paystack_max: ^1.0.6
  flutterwave_standard: ^1.1.0
  # `paytm_allinonesdk` 1.2.8 is abandoned and still imports the v1
  # Android embedding `Registrar`, which Flutter removed in 3.29. Paytm's
  # replacement is `paytmpayments_allinonesdk` 1.0.x (v2 embedding).
  paytmpayments_allinonesdk: ^1.0.4
  pay: ^3.3.0
  # Maintained fork of the abandoned `flutter_braintree` — supports the
  # Flutter v2 Android embedding and modern Braintree SDKs.
  braintree_flutter_plus: ^5.2.1
  flutter_stripe: ^12.6.0
  flutter_cashfree_pg_sdk: ^2.3.4
  phonepe_payment_sdk: ^3.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
